name: Bug Report
description: Report a bug in Runoff
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Runoff Version
      description: "Output of `runoff --version` or the release tag"
      placeholder: "2.5.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      description: "Operating system and architecture"
      placeholder: "Ubuntu 24.04 x86_64 / Windows 11 / macOS 15 ARM64"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Run `runoff -p pass run all`
        2. Observe error in output
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
