<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: teal to green (light mode) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="40%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0d9488" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#0d9488" opacity="0.04"/>

    <!-- === BRANCHING ATTACK PATHS === -->

    <!-- Root node at top -->
    <circle cx="80" cy="28" r="4" fill="#0d9488" opacity="0.9"/>
    <circle cx="80" cy="28" r="2" fill="#ffffff"/>

    <!-- Main trunk descending -->
    <line x1="80" y1="32" x2="80" y2="58"
          stroke="url(#g3)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Branch point -->
    <circle cx="80" cy="58" r="2.5" fill="#0d9488" opacity="0.7"/>

    <!-- Left major branch -->
    <path d="M 80 58 Q 60 75 45 95"
          fill="none" stroke="url(#g3)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Left sub-branches -->
    <path d="M 45 95 Q 34 108 28 118"
          fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 45 95 Q 50 110 55 120"
          fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

    <!-- Right major branch -->
    <path d="M 80 58 Q 102 78 115 95"
          fill="none" stroke="url(#g3)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Right sub-branches -->
    <path d="M 115 95 Q 125 108 132 118"
          fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 115 95 Q 110 110 105 120"
          fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

    <!-- Center minor branch -->
    <path d="M 80 58 Q 82 80 85 100"
          fill="none" stroke="url(#g3)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 85 100 Q 88 112 92 120"
          fill="none" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

    <!-- Leaf/target nodes -->
    <circle cx="28" cy="118" r="2.5" fill="#16a34a" opacity="0.75"/>
    <circle cx="55" cy="120" r="2.5" fill="#16a34a" opacity="0.7"/>
    <circle cx="132" cy="118" r="2.5" fill="#16a34a" opacity="0.75"/>
    <circle cx="105" cy="120" r="2.5" fill="#16a34a" opacity="0.7"/>
    <circle cx="92" cy="120" r="2" fill="#16a34a" opacity="0.55"/>

    <!-- Sub-branch points -->
    <circle cx="45" cy="95" r="2" fill="#0d9488" opacity="0.55"/>
    <circle cx="115" cy="95" r="2" fill="#0d9488" opacity="0.55"/>

    <!-- Scattered particles -->
    <circle cx="38" cy="78" r="1.2" fill="#0d9488" opacity="0.25"/>
    <circle cx="98" cy="72" r="1.3" fill="#0d9488" opacity="0.2"/>
    <circle cx="62" cy="108" r="1.1" fill="#16a34a" opacity="0.18"/>
    <circle cx="125" cy="108" r="1.2" fill="#16a34a" opacity="0.2"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#0d9488" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#16a34a" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "RUNOFF" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">RUNOFF</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">AD SECURITY AUDIT</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">PYTHON  ·  BLOODHOUND  ·  ATTACK PATHS</text>
</svg>