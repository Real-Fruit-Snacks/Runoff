<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="branchGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="branchGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="60%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Branching Attack Paths logomark -->
  <!-- Root entry point node -->
  <circle cx="80" cy="28" r="4" fill="#0d9488" filter="url(#glow)"/>

  <!-- Main trunk from root -->
  <line x1="80" y1="32" x2="80" y2="58" stroke="url(#branchGrad1)" stroke-width="2.5" opacity="0.85"/>

  <!-- First branch point -->
  <circle cx="80" cy="58" r="2" fill="#0d9488" opacity="0.7"/>

  <!-- Left major branch -->
  <path d="M80,58 Q60,75 45,95" fill="none" stroke="url(#branchGrad2)" stroke-width="2.5" opacity="0.75"/>
  <!-- Left sub-branch left -->
  <path d="M45,95 Q32,110 22,130" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
  <!-- Left sub-branch right -->
  <path d="M45,95 Q50,112 55,135" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.55"/>
  <!-- Left sub-branch far left -->
  <path d="M45,95 Q28,100 18,115" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.45"/>

  <!-- Right major branch -->
  <path d="M80,58 Q105,78 118,100" fill="none" stroke="url(#branchGrad2)" stroke-width="2.5" opacity="0.75"/>
  <!-- Right sub-branch right -->
  <path d="M118,100 Q130,118 140,140" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
  <!-- Right sub-branch left -->
  <path d="M118,100 Q108,120 102,142" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.55"/>

  <!-- Center-right minor branch -->
  <path d="M80,58 Q88,80 92,105" fill="none" stroke="url(#branchGrad2)" stroke-width="2" opacity="0.6"/>
  <!-- Center-right sub-branch -->
  <path d="M92,105 Q98,125 105,148" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.45"/>
  <path d="M92,105 Q82,125 78,150" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>

  <!-- Leaf/target nodes -->
  <circle cx="22" cy="130" r="3" fill="#16a34a" opacity="0.85"/>
  <circle cx="55" cy="135" r="3" fill="#16a34a" opacity="0.8"/>
  <circle cx="18" cy="115" r="2.5" fill="#16a34a" opacity="0.7"/>
  <circle cx="140" cy="140" r="3" fill="#16a34a" opacity="0.85"/>
  <circle cx="102" cy="142" r="3" fill="#16a34a" opacity="0.8"/>
  <circle cx="105" cy="148" r="2.5" fill="#16a34a" opacity="0.7"/>
  <circle cx="78" cy="150" r="2.5" fill="#16a34a" opacity="0.65"/>

  <!-- Scattered particle dots -->
  <circle cx="38" cy="78" r="1.2" fill="#0d9488" opacity="0.35"/>
  <circle cx="98" cy="72" r="1.4" fill="#0d9488" opacity="0.3"/>
  <circle cx="62" cy="108" r="1.3" fill="#16a34a" opacity="0.25"/>
  <circle cx="130" cy="122" r="1.2" fill="#16a34a" opacity="0.3"/>
  <circle cx="32" cy="118" r="1.1" fill="#16a34a" opacity="0.2"/>
  <circle cx="115" cy="85" r="1.3" fill="#0d9488" opacity="0.25"/>
  <circle cx="68" cy="42" r="1.2" fill="#0d9488" opacity="0.3"/>
  <circle cx="92" cy="45" r="1.1" fill="#0d9488" opacity="0.25"/>

  <!-- Faint outer frame -->
  <rect x="5" y="10" width="150" height="165" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.15"/>

  <!-- Typography -->
  <!-- Project name -->
  <text x="200" y="112" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="76" font-weight="800" letter-spacing="18" fill="url(#textGrad)">RUNOFF</text>

  <!-- Separator line -->
  <line x1="200" y1="132" x2="610" y2="132" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="200" y="155" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace" font-size="11.5" letter-spacing="5.5" fill="#57534e">AD SECURITY AUDIT</text>

  <!-- Descriptors -->
  <text x="200" y="175" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace" font-size="9" letter-spacing="3" fill="#a8a29e">PYTHON · BLOODHOUND · ATTACK PATHS</text>
</svg>